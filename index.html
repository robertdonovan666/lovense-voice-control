<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Lovense Control">
    <title>Lovense Voice Control</title>
    <script src="https://api.lovense-api.com/basic-sdk/core.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #0a0a0a;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            -webkit-user-select: none;
            user-select: none;
            overflow: hidden;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        /* Top Status Bar */
        .status-bar {
            background: #1a1a1a;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2a2a2a;
        }

        .device-info {
            display: flex;
            gap: 24px;
        }

        .info-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .info-label {
            font-size: 11px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .info-value {
            font-size: 16px;
            font-weight: 500;
            color: #fff;
            font-family: 'Courier New', monospace;
        }

        .connection-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ff1493;
            animation: pulse 2s infinite;
        }

        .connection-dot.disconnected {
            background: #555;
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Main Content */
        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 24px;
            overflow-y: auto;
        }

        /* QR Code Section */
        .qr-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
            flex: 1;
        }

        .qr-box {
            background: #1a1a1a;
            border: 2px solid #2a2a2a;
            border-radius: 16px;
            padding: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .qr-code {
            max-width: 280px;
            width: 100%;
            height: auto;
        }

        .qr-instructions {
            text-align: center;
            color: #aaa;
            font-size: 14px;
            line-height: 1.6;
        }

        .qr-instructions strong {
            color: #ff1493;
            display: block;
            margin-bottom: 8px;
            font-size: 16px;
        }

        .connect-button {
            background: #ff1493;
            border: none;
            border-radius: 20px;
            padding: 32px 48px;
            cursor: pointer;
            font-size: 18px;
            color: white;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 8px 24px rgba(255, 20, 147, 0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .connect-button:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 32px rgba(255, 20, 147, 0.5);
        }

        .connect-button:active {
            transform: scale(0.95);
        }

        /* Voice Control Section */
        .voice-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 32px;
            width: 100%;
            max-width: 400px;
        }

        /* Voice Button Container */
        .voice-container {
            position: relative;
            width: 280px;
            height: 280px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Voice Button */
        .voice-button {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #ff1493;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: bold;
            color: white;
            transition: all 0.2s ease;
            box-shadow: 0 8px 24px rgba(255, 20, 147, 0.3);
            position: relative;
            z-index: 2;
        }

        .voice-button:active {
            transform: scale(0.95);
            box-shadow: 0 4px 12px rgba(255, 20, 147, 0.4);
        }

        .voice-button:disabled {
            background: #555;
            cursor: not-allowed;
            box-shadow: none;
        }

        .voice-button.listening {
            animation: listening-pulse 1s infinite;
        }

        @keyframes listening-pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* Command Ring */
        .command-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .command-text {
            position: absolute;
            font-family: 'Avenir', 'Trebuchet MS', 'Century Gothic', sans-serif;
            font-size: 13px;
            font-weight: 700;
            color: #ff1493;
            opacity: 0.8;
            letter-spacing: 0.8px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 6px 10px;
            transition: all 0.2s ease;
            text-transform: uppercase;
        }

        .command-text:hover:not(:disabled) {
            opacity: 1;
            transform: scale(1.15);
            text-shadow: 0 0 8px rgba(255, 20, 147, 0.5);
        }

        .command-text:active:not(:disabled) {
            transform: scale(0.95);
        }

        .command-text:disabled {
            opacity: 0.2;
            cursor: not-allowed;
        }

        /* Positions commands in a circle around the button */
        .cmd-start { top: -30px; right: -50px; }
        .cmd-stop { top: -30px; left: -50px; }
        .cmd-faster { right: -50px; top: 50%; transform: translateY(-50%); }
        .cmd-slower { left: -50px; top: 50%; transform: translateY(-50%); }
        .cmd-harder { bottom: -30px; right: -50px; }
        .cmd-softer { bottom: -30px; left: -50px; }

        /* Waveform Visualizer */
        .waveform {
            width: 200px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            background: rgba(255, 20, 147, 0.1);
            border-radius: 8px;
            padding: 12px;
            display: none;
        }

        .waveform.active {
            display: flex;
        }

        .wave-bar {
            width: 4px;
            background: #ff1493;
            border-radius: 2px;
            animation: wave 0.6s ease-in-out infinite;
        }

        .wave-bar:nth-child(1) { animation-delay: 0s; height: 20px; }
        .wave-bar:nth-child(2) { animation-delay: 0.1s; height: 30px; }
        .wave-bar:nth-child(3) { animation-delay: 0.2s; height: 40px; }
        .wave-bar:nth-child(4) { animation-delay: 0.3s; height: 50px; }
        .wave-bar:nth-child(5) { animation-delay: 0.4s; height: 40px; }
        .wave-bar:nth-child(6) { animation-delay: 0.5s; height: 30px; }
        .wave-bar:nth-child(7) { animation-delay: 0.6s; height: 20px; }

        @keyframes wave {
            0%, 100% { height: 10px; }
            50% { height: 50px; }
        }

        /* Voice Transcript */
        .transcript {
            text-align: center;
            color: #aaa;
            font-size: 14px;
            min-height: 20px;
            margin-top: 8px;
        }

        .transcript.active {
            color: #ff1493;
        }

        /* Pattern Presets */
        .patterns-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            width: 100%;
        }

        .pattern-btn {
            background: #1a1a1a;
            border: 2px solid #2a2a2a;
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            font-size: 14px;
            color: #fff;
            font-weight: 500;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .pattern-btn:active {
            border-color: #ff1493;
            background: rgba(255, 20, 147, 0.1);
            transform: scale(0.98);
        }

        .pattern-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .pattern-icon {
            font-size: 24px;
        }

        /* Intensity Slider */
        .slider-section {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .slider-label {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            justify-content: space-between;
        }

        .slider-value {
            color: #ff1493;
            font-weight: 600;
        }

        .intensity-slider {
            width: 100%;
            height: 8px;
            border-radius: 4px;
            background: #2a2a2a;
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }

        .intensity-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #ff1493;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(255, 20, 147, 0.4);
        }

        .intensity-slider::-moz-range-thumb {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #ff1493;
            cursor: pointer;
            border: none;
            box-shadow: 0 2px 8px rgba(255, 20, 147, 0.4);
        }

        /* Quick Controls */
        .quick-controls {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            width: 100%;
        }

        .control-btn {
            background: #1a1a1a;
            border: 2px solid #2a2a2a;
            border-radius: 12px;
            padding: 16px;
            cursor: pointer;
            font-size: 14px;
            color: #fff;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .control-btn:active {
            border-color: #ff1493;
            background: rgba(255, 20, 147, 0.1);
        }

        .control-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Status Messages */
        .status-message {
            font-size: 14px;
            color: #aaa;
            text-align: center;
            padding: 12px 24px;
            background: rgba(255, 20, 147, 0.05);
            border-radius: 8px;
            border-left: 3px solid #ff1493;
        }

        /* Hidden by default */
        .hidden {
            display: none !important;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .container {
                padding: 16px;
            }

            .status-bar {
                padding: 12px 16px;
            }

            .patterns-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="status-bar">
        <div class="device-info">
            <div class="info-item">
                <span class="info-label">Status</span>
                <div style="display: flex; align-items: center; gap: 8px;">
                    <div class="connection-dot disconnected" id="connectionDot"></div>
                    <span id="connectionStatus">Disconnected</span>
                </div>
            </div>
            <div class="info-item">
                <span class="info-label">Device</span>
                <span class="info-value" id="deviceName">—</span>
            </div>
            <div class="info-item">
                <span class="info-label">Battery</span>
                <span class="info-value" id="deviceBattery">—</span>
            </div>
        </div>
    </div>

    <div class="container">
        <!-- QR Code Auth Section -->
        <div id="qrSection" class="qr-container">
            <div class="qr-box">
                <img id="qrCode" class="qr-code" src="" alt="QR Code">
            </div>
            <div class="qr-instructions">
                <strong>Print & Scan</strong>
                Print this QR code. Then open Lovense Connect App on your iPad and scan the printed code.
            </div>
        </div>

        <!-- Voice Control Section (hidden until connected) -->
        <div id="controlSection" class="voice-section hidden">
            <div class="voice-container">
                <div class="command-ring">
                    <button class="command-text cmd-stop" id="cmdStop" disabled>stop</button>
                    <button class="command-text cmd-start" id="cmdStart" disabled>start</button>
                    <button class="command-text cmd-slower" id="cmdSlower" disabled>slower</button>
                    <button class="command-text cmd-faster" id="cmdFaster" disabled>faster</button>
                    <button class="command-text cmd-softer" id="cmdSofter" disabled>softer</button>
                    <button class="command-text cmd-harder" id="cmdHarder" disabled>harder</button>
                </div>
                <button class="voice-button" id="voiceBtn" disabled>🎤</button>
            </div>
            <div class="waveform" id="waveform">
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
            </div>
            <div class="transcript" id="transcript"></div>

            <!-- Intensity Slider -->
            <div class="slider-section">
                <div class="slider-label">
                    <span>Intensity</span>
                    <span class="slider-value" id="intensityValue">5</span>
                </div>
                <input type="range" class="intensity-slider" id="intensitySlider" min="0" max="20" value="5" disabled>
            </div>

            <!-- Speed Slider (hidden for some patterns) -->
            <div class="slider-section" id="speedSection" style="display: none;">
                <div class="slider-label">
                    <span>Speed</span>
                    <span class="slider-value" id="speedValue">50%</span>
                </div>
                <input type="range" class="intensity-slider" id="speedSlider" min="0" max="100" value="50" disabled>
            </div>

            <!-- Pattern Presets -->
            <div style="width: 100%;">
                <div style="font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px;">Patterns</div>
                <div class="patterns-grid">
                    <button class="pattern-btn" id="patternPulse" disabled>
                        <span class="pattern-icon">📳</span>
                        Pulse
                        <span style="font-size: 10px; color: #888;">⚡</span>
                    </button>
                    <button class="pattern-btn" id="patternWave" disabled>
                        <span class="pattern-icon">〰️</span>
                        Wave
                        <span style="font-size: 10px; color: #888;">⚡</span>
                    </button>
                    <button class="pattern-btn" id="patternFireworks" disabled>
                        <span class="pattern-icon">✨</span>
                        Fireworks
                        <span style="font-size: 10px; color: #888;">⚡</span>
                    </button>
                    <button class="pattern-btn" id="patternEarthquake" disabled>
                        <span class="pattern-icon">━━━</span>
                        Earthquake
                        <span style="font-size: 10px; color: #555;">—</span>
                    </button>
                </div>
            </div>

            <div id="statusMessage" class="status-message hidden"></div>
        </div>
    </div>

    <script>
        // ==================== Configuration ====================
        const config = {
            localStorage: true,
            voiceLanguage: 'en-US',
            voiceContinuousListening: true,
        };

        // ==================== State ====================
        let state = {
            sdk: null,
            connected: false,
            listening: false,
            currentIntensity: 5,
            currentSpeed: 50,
            currentPattern: null,
            onlineToys: [],
        };

        // ==================== UI Elements ====================
        const qrSection = document.getElementById('qrSection');
        const controlSection = document.getElementById('controlSection');
        const qrCodeImg = document.getElementById('qrCode');
        const voiceBtn = document.getElementById('voiceBtn');
        const waveform = document.getElementById('waveform');
        const transcript = document.getElementById('transcript');
        const intensitySlider = document.getElementById('intensitySlider');
        const intensityValue = document.getElementById('intensityValue');
        const speedSlider = document.getElementById('speedSlider');
        const speedValue = document.getElementById('speedValue');
        const speedSection = document.getElementById('speedSection');
        const connectionDot = document.getElementById('connectionDot');
        const connectionStatus = document.getElementById('connectionStatus');
        const deviceName = document.getElementById('deviceName');
        const deviceBattery = document.getElementById('deviceBattery');
        const statusMessage = document.getElementById('statusMessage');

        // Pattern and control buttons
        const patternButtons = {
            pulse: document.getElementById('patternPulse'),
            wave: document.getElementById('patternWave'),
            fireworks: document.getElementById('patternFireworks'),
            earthquake: document.getElementById('patternEarthquake'),
        };



        // ==================== Lovense SDK Initialization ====================
        async function initializeLovenseSdk() {
            console.log('📍 STEP 1: initializeLovenseSdk() called');
            try {
                // Check for stored connection data
                const storedAuth = localStorage.getItem('lovenseAuthToken');
                const storedUid = localStorage.getItem('lovenseUid');
                console.log('📍 STEP 2: Checking for stored credentials');
                console.log('   - storedAuth:', storedAuth ? '✅ Found' : '❌ Not found');
                console.log('   - storedUid:', storedUid ? '✅ Found' : '❌ Not found');

                if (storedAuth && storedUid) {
                    console.log('📍 STEP 3a: Found stored credentials - reconnecting');
                    initializeWithToken(storedAuth, storedUid);
                } else {
                    console.log('📍 STEP 3b: No stored credentials - generating QR code');
                    showQrCode();
                }
            } catch (error) {
                console.error('❌ SDK initialization error:', error);
                showError('Failed to initialize SDK: ' + error.message);
            }
        }

        async function showQrCode() {
            console.log('📍 STEP 4: showQrCode() called - creating SDK instance');
            try {
                // Create temporary SDK instance for QR code
                console.log('📍 STEP 5: Instantiating LovenseBasicSdk with:');
                console.log('   - platform: "web"');
                console.log('   - uid: "aocouple"');
                
                const tempSdk = new LovenseBasicSdk({
                    platform: 'web',
                    authToken: 'temp',
                    uid: 'aocouple',
                });
                console.log('✅ STEP 6: SDK instance created successfully');

                tempSdk.on('ready', async () => {
                    console.log('✅ STEP 7: SDK ready event triggered');
                    try {
                        console.log('📍 STEP 8: Calling getQrcode()...');
                        const qrRes = await tempSdk.getQrcode();
                        console.log('📍 STEP 9: getQrcode() response received:', qrRes);
                        
                        if (qrRes && qrRes.qrcodeUrl) {
                            console.log('✅ STEP 10: QR code URL received - displaying QR code');
                            qrCodeImg.src = qrRes.qrcodeUrl;
                            console.log('✅ STEP 11: QR code image set');
                            // Listen for successful connection
                            handleQrConnection(tempSdk);
                        } else {
                            console.error('❌ STEP 10: No QR code URL in response');
                            showError('Failed to generate QR code');
                        }
                    } catch (e) {
                        console.error('❌ STEP 8-9: getQrcode() failed:', e);
                        showError('Failed to get QR code: ' + e.message);
                    }
                });

                tempSdk.on('sdkError', (data) => {
                    console.error('❌ SDK Error event:', data.code, data.message);
                    showError('SDK Error: ' + data.message);
                });
            } catch (error) {
                console.error('❌ STEP 5: SDK instantiation failed:', error);
                showError('Failed to setup QR code: ' + error.message);
            }
        }

        function handleQrConnection(tempSdk) {
            // Listen for connection via QR scan
            tempSdk.on('appStatusChange', (status) => {
                if (status) {
                    // Connected! 
                    tempSdk.connectLovenseAPP();
                    // Monitor for toys coming online
                    tempSdk.on('toyOnlineChange', (online) => {
                        if (online) {
                            // Successfully connected to device
                            state.sdk = tempSdk;
                            setupSdk(tempSdk);
                        }
                    });
                }
            });
        }

        function setupConnectButton() {
            const connectBtn = document.getElementById('connectButton');
            if (!connectBtn) return;

            connectBtn.addEventListener('click', () => {
                try {
                    // Create temporary SDK instance
                    const tempSdk = new LovenseBasicSdk({
                        platform: 'web',
                        authToken: 'temp',
                        uid: 'temp',
                    });

                    tempSdk.on('ready', () => {
                        console.log('SDK ready for connection');
                        // Launch Lovense Connect App
                        tempSdk.connectLovenseAPP();
                    });

                    tempSdk.on('appStatusChange', (status) => {
                        console.log('App status changed:', status);
                        if (status) {
                            state.sdk = tempSdk;
                            setupSdk(tempSdk);
                        }
                    });

                    tempSdk.on('toyOnlineChange', (online) => {
                        console.log('Toy online status:', online);
                        if (online) {
                            updateConnectionStatus(true);
                        }
                    });

                    tempSdk.on('sdkError', (data) => {
                        console.error('SDK Error:', data.code, data.message);
                        showError('Connection error: ' + data.message);
                    });
                } catch (error) {
                    console.error('Connection setup error:', error);
                    showError('Failed to setup connection');
                }
            });
        }

        function initializeWithToken(authToken, uid) {
            try {
                const sdk = new LovenseBasicSdk({
                    platform: 'web',
                    authToken: authToken,
                    uid: uid || 'aocouple',
                });

                sdk.on('ready', () => {
                    console.log('SDK ready with stored credentials');
                    setupSdk(sdk);
                });

                sdk.on('sdkError', (data) => {
                    console.error('SDK Error:', data.code, data.message);
                    if (data.code === 'AUTH_FAILED') {
                        // Clear stored credentials and show QR code again
                        localStorage.removeItem('lovenseAuthToken');
                        localStorage.removeItem('lovenseUid');
                        showQrCode();
                    }
                });
            } catch (error) {
                console.error('Token initialization error:', error);
                showQrCode();
            }
        }

        function setupSdk(sdk) {
            state.sdk = sdk;

            // Listen for connection changes
            sdk.on('appStatusChange', (status) => {
                updateConnectionStatus(status);
            });

            sdk.on('toyOnlineChange', (online) => {
                updateConnectionStatus(online);
            });

            sdk.on('toyInfoChange', (toys) => {
                state.onlineToys = Array.isArray(toys) ? toys : [toys];
                updateDeviceInfo();
            });

            // Get initial toys
            const toys = sdk.getOnlineToys();
            if (toys.length > 0) {
                state.onlineToys = toys;
                updateConnectionStatus(true);
            } else {
                checkConnection();
            }
        }

        function checkConnection() {
            if (state.sdk) {
                const online = state.sdk.checkToyOnline();
                updateConnectionStatus(online);
                if (!online) {
                    setTimeout(checkConnection, 2000);
                }
            }
        }

        function updateConnectionStatus(connected) {
            state.connected = connected;
            connectionDot.classList.toggle('disconnected', !connected);
            connectionStatus.textContent = connected ? 'Connected' : 'Disconnected';

            qrSection.classList.toggle('hidden', connected);
            controlSection.classList.toggle('hidden', !connected);

            // Enable/disable controls
            voiceBtn.disabled = !connected;
            intensitySlider.disabled = !connected;
            speedSlider.disabled = !connected;
            Object.values(patternButtons).forEach(btn => btn.disabled = !connected);
            Object.values(cmdButtons).forEach(btn => btn.disabled = !connected);
        }

        function updateDeviceInfo() {
            if (state.onlineToys.length > 0) {
                const device = state.onlineToys[0];
                deviceName.textContent = device.nickname || device.name;
                deviceBattery.textContent = `${device.battery}%`;
            }
        }

        // ==================== Voice Control ====================
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.language = config.voiceLanguage;
            recognition.continuous = true;
            recognition.interimResults = true;

            recognition.onstart = () => {
                state.listening = true;
                voiceBtn.classList.add('listening');
                waveform.classList.add('active');
                transcript.textContent = 'Listening...';
                transcript.classList.add('active');
            };

            recognition.onresult = (event) => {
                let interimTranscript = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    const transcriptSegment = event.results[i][0].transcript;
                    if (event.results[i].isFinal) {
                        processVoiceCommand(transcriptSegment);
                    } else {
                        interimTranscript += transcriptSegment;
                    }
                }
                transcript.textContent = interimTranscript || 'Processing...';
            };

            recognition.onerror = (event) => {
                console.error('Speech recognition error:', event.error);
                transcript.textContent = 'Error: ' + event.error;
            };

            recognition.onend = () => {
                state.listening = false;
                voiceBtn.classList.remove('listening');
                waveform.classList.remove('active');
                transcript.classList.remove('active');
                transcript.textContent = '';
            };
        }

        voiceBtn.addEventListener('click', () => {
            if (!recognition) {
                showError('Speech recognition not supported on this device');
                return;
            }

            if (state.listening) {
                recognition.stop();
            } else {
                recognition.start();
            }
        });

        function processVoiceCommand(command) {
            const cmd = command.toLowerCase().trim();
            console.log('Voice command:', cmd);

            // Parse commands
            if (cmd.includes('start')) {
                sendCommand('start');
            } else if (cmd.includes('stop')) {
                sendCommand('stop');
            } else if (cmd.includes('harder') || cmd.includes('increase')) {
                increaseIntensity();
            } else if (cmd.includes('softer') || cmd.includes('decrease')) {
                decreaseIntensity();
            } else if (cmd.includes('speed up') || cmd.includes('faster') || cmd.includes('go faster')) {
                increaseSpeed();
            } else if (cmd.includes('slow down') || cmd.includes('slower') || cmd.includes('go slower')) {
                decreaseSpeed();
            } else if (cmd.includes('pulse')) {
                state.currentPattern = 'pulse';
                speedSection.style.display = 'flex';
                speedSlider.disabled = false;
                sendPattern('pulse');
            } else if (cmd.includes('wave')) {
                state.currentPattern = 'wave';
                speedSection.style.display = 'flex';
                speedSlider.disabled = false;
                sendPattern('wave');
            } else if (cmd.includes('firework')) {
                state.currentPattern = 'fireworks';
                speedSection.style.display = 'flex';
                speedSlider.disabled = false;
                sendPattern('fireworks');
            } else if (cmd.includes('earthquake')) {
                state.currentPattern = 'earthquake';
                speedSection.style.display = 'none';
                speedSlider.disabled = true;
                sendPattern('earthquake');
            } else {
                showStatus('Command: "' + command.substring(0, 30) + '..."');
            }
        }

        function increaseSpeed() {
            if (state.currentPattern === 'earthquake') {
                showStatus('Speed control not available for Earthquake');
                return;
            }
            if (state.currentSpeed < 100) {
                state.currentSpeed += 10;
                speedSlider.value = state.currentSpeed;
                speedValue.textContent = state.currentSpeed + '%';
                showStatus(`Speed: ${state.currentSpeed}%`);
            } else {
                playBeep();
                showStatus('⚠️ Maximum speed reached');
            }
        }

        function decreaseSpeed() {
            if (state.currentPattern === 'earthquake') {
                showStatus('Speed control not available for Earthquake');
                return;
            }
            if (state.currentSpeed > 0) {
                state.currentSpeed -= 10;
                speedSlider.value = state.currentSpeed;
                speedValue.textContent = state.currentSpeed + '%';
                showStatus(`Speed: ${state.currentSpeed}%`);
            } else {
                playBeep();
                showStatus('⚠️ Minimum speed reached');
            }
        }

        // ==================== Device Commands ====================
        function sendCommand(type) {
            if (!state.sdk || state.onlineToys.length === 0) {
                showError('No device connected');
                return;
            }

            try {
                if (type === 'start') {
                    state.sdk.sendToyCommand({ vibrate: state.currentIntensity || 5 });
                    showStatus('Started');
                } else if (type === 'stop') {
                    state.sdk.stopToyAction();
                    showStatus('Stopped');
                }
            } catch (error) {
                console.error('Command error:', error);
                showError('Failed to send command');
            }
        }

        function sendPattern(pattern) {
            if (!state.sdk || state.onlineToys.length === 0) {
                showError('No device connected');
                return;
            }

            try {
                state.sdk.sendPresetCommand({ name: pattern, time: 0 });
                showStatus(`Pattern: ${pattern}`);
            } catch (error) {
                console.error('Pattern error:', error);
                showError('Failed to send pattern');
            }
        }

        function increaseIntensity() {
            if (state.currentIntensity < 20) {
                state.currentIntensity++;
                intensitySlider.value = state.currentIntensity;
                intensityValue.textContent = state.currentIntensity;
                if (state.sdk) {
                    state.sdk.sendToyCommand({ vibrate: state.currentIntensity });
                }
                showStatus(`Intensity: ${state.currentIntensity}/20`);
            } else {
                playBeep();
                showStatus('⚠️ Maximum intensity reached');
            }
        }

        function decreaseIntensity() {
            if (state.currentIntensity > 0) {
                state.currentIntensity--;
                intensitySlider.value = state.currentIntensity;
                intensityValue.textContent = state.currentIntensity;
                if (state.sdk) {
                    state.sdk.sendToyCommand({ vibrate: state.currentIntensity });
                }
                showStatus(`Intensity: ${state.currentIntensity}/20`);
            } else {
                playBeep();
                showStatus('⚠️ Minimum intensity reached');
            }
        }

        // ==================== Command Button Listeners ====================
        const cmdButtons = {
            start: document.getElementById('cmdStart'),
            stop: document.getElementById('cmdStop'),
            harder: document.getElementById('cmdHarder'),
            softer: document.getElementById('cmdSofter'),
            faster: document.getElementById('cmdFaster'),
            slower: document.getElementById('cmdSlower'),
        };

        cmdButtons.start.addEventListener('click', () => sendCommand('start'));
        cmdButtons.stop.addEventListener('click', () => sendCommand('stop'));
        cmdButtons.harder.addEventListener('click', () => increaseIntensity());
        cmdButtons.softer.addEventListener('click', () => decreaseIntensity());
        cmdButtons.faster.addEventListener('click', () => increaseSpeed());
        cmdButtons.slower.addEventListener('click', () => decreaseSpeed());

        // ==================== Pattern Button Listeners ====================
        intensitySlider.addEventListener('input', (e) => {
            state.currentIntensity = parseInt(e.target.value);
            intensityValue.textContent = state.currentIntensity;
            if (state.sdk && state.currentIntensity > 0) {
                state.sdk.sendToyCommand({ vibrate: state.currentIntensity });
            }
        });

        speedSlider.addEventListener('input', (e) => {
            state.currentSpeed = parseInt(e.target.value);
            speedValue.textContent = state.currentSpeed + '%';
            showStatus(`Speed: ${state.currentSpeed}%`);
        });

        patternButtons.pulse.addEventListener('click', () => {
            state.currentPattern = 'pulse';
            speedSection.style.display = 'flex';
            speedSlider.disabled = false;
            cmdButtons.faster.disabled = false;
            cmdButtons.slower.disabled = false;
            sendPattern('pulse');
        });
        patternButtons.wave.addEventListener('click', () => {
            state.currentPattern = 'wave';
            speedSection.style.display = 'flex';
            speedSlider.disabled = false;
            cmdButtons.faster.disabled = false;
            cmdButtons.slower.disabled = false;
            sendPattern('wave');
        });
        patternButtons.fireworks.addEventListener('click', () => {
            state.currentPattern = 'fireworks';
            speedSection.style.display = 'flex';
            speedSlider.disabled = false;
            cmdButtons.faster.disabled = false;
            cmdButtons.slower.disabled = false;
            sendPattern('fireworks');
        });
        patternButtons.earthquake.addEventListener('click', () => {
            state.currentPattern = 'earthquake';
            speedSection.style.display = 'none';
            speedSlider.disabled = true;
            cmdButtons.faster.disabled = true;
            cmdButtons.slower.disabled = true;
            sendPattern('earthquake');
        });



        // ==================== Audio Feedback ====================
        function playBeep() {
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                oscillator.frequency.value = 800; // Gentle high-pitched tone
                oscillator.type = 'sine';
                
                gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.15);
                
                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + 0.15);
            } catch (e) {
                // Audio context not available, silently continue
            }
        }

        // ==================== Debug Logging ====================
        console.log('🚀 Page loaded - Lovense Voice Control App initializing');
        console.log('📱 UID: aocouple');
        console.log('🔗 SDK URL: https://api.lovense-api.com/basic-sdk/core.min.js');
        
        // Check if SDK loaded after 2 seconds
        setTimeout(() => {
            if (typeof LovenseBasicSdk !== 'undefined') {
                console.log('✅ SUCCESS: LovenseBasicSdk is loaded and available');
            } else {
                console.error('❌ FAILED: LovenseBasicSdk is NOT available - SDK did not load');
            }
        }, 2000);

        // ==================== Utility Functions ====================
        function showStatus(message) {
            statusMessage.textContent = message;
            statusMessage.classList.remove('hidden');
            setTimeout(() => statusMessage.classList.add('hidden'), 3000);
        }

        function showError(message) {
            statusMessage.textContent = '❌ ' + message;
            statusMessage.classList.remove('hidden');
            setTimeout(() => statusMessage.classList.add('hidden'), 5000);
        }

        // ==================== Initialize ====================
        document.addEventListener('DOMContentLoaded', initializeLovenseSdk);
    </script>
</body>
</html>
